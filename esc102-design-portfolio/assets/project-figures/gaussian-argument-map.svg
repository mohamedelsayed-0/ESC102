<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Gaussian argument map</title>
  <desc id="desc">A simplified reasoning map from reduced setting to analytical claim to benchmark pressure to scoped conclusion.</desc>
  <rect width="1200" height="820" fill="#f7f0e4"/>
  <rect x="40" y="40" width="1120" height="740" rx="36" fill="#fffaf2" stroke="#d9c7ae" stroke-width="3"/>

  <text x="72" y="104" font-family="'Public Sans', Arial, sans-serif" font-size="18" fill="#7e5a36" letter-spacing="3">GAUSSIAN ARGUMENT MAP</text>
  <text x="72" y="146" font-family="'Fraunces', Georgia, serif" font-size="34" fill="#18202a">The claim only worked because it had to earn its scope</text>
  <text x="72" y="184" font-family="'Public Sans', Arial, sans-serif" font-size="20" fill="#475362">The plots matter because they pressure the analytical shortcut.</text>
  <text x="72" y="210" font-family="'Public Sans', Arial, sans-serif" font-size="20" fill="#475362">They do not just decorate it.</text>

  <g font-family="'Public Sans', Arial, sans-serif">
    <rect x="120" y="304" width="280" height="180" rx="26" fill="#fff" stroke="#d8c7b0" stroke-width="2"/>
    <rect x="460" y="304" width="280" height="180" rx="26" fill="#fff" stroke="#d8c7b0" stroke-width="2"/>
    <rect x="800" y="304" width="280" height="180" rx="26" fill="#13212a" opacity="0.97"/>

    <text x="148" y="344" font-size="18" fill="#7e5a36" letter-spacing="2">REDUCE + CLAIM</text>
    <text x="148" y="382" font-size="28" font-weight="700" fill="#19202a">Choose symmetry, then</text>
    <text x="148" y="416" font-size="28" font-weight="700" fill="#19202a">state the threshold</text>
    <text x="148" y="448" font-size="18" fill="#475362">Turn repeated computation into</text>
    <text x="148" y="472" font-size="18" fill="#475362">a readable inequality.</text>

    <text x="488" y="344" font-size="18" fill="#7e5a36" letter-spacing="2">BENCHMARK</text>
    <text x="488" y="382" font-size="28" font-weight="700" fill="#19202a">Use plots to test</text>
    <text x="488" y="416" font-size="28" font-weight="700" fill="#19202a">where it breaks</text>
    <text x="488" y="448" font-size="18" fill="#475362">The figures decide where the</text>
    <text x="488" y="472" font-size="18" fill="#475362">shortcut tracks exact behavior.</text>

    <text x="828" y="344" font-size="18" fill="#d8e6e8" letter-spacing="2">OUTCOME</text>
    <text x="828" y="382" font-size="28" font-weight="700" fill="#f5efe4">Keep only the</text>
    <text x="828" y="416" font-size="28" font-weight="700" fill="#f5efe4">scoped claim</text>
    <text x="828" y="446" font-size="17" fill="#d8e6e8">Only where plots support it.</text>
  </g>

  <g stroke="#255d67" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M400 394 H460"/>
    <path d="M740 394 H800"/>
  </g>

  <g stroke="#255d67" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M446 380 L460 394 L446 408"/>
    <path d="M786 380 L800 394 L786 408"/>
  </g>

  <g>
    <rect x="96" y="622" width="1008" height="88" rx="24" fill="#fff" stroke="#d8c7b0" stroke-width="2"/>
    <text x="128" y="670" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#aa5a32" letter-spacing="2">WHY THIS VISUAL HELPS</text>
    <text x="128" y="700" font-family="'Public Sans', Arial, sans-serif" font-size="18" fill="#475362">With the map, the figures read as pressure on the claim and a reason to narrow its scope.</text>
  </g>
</svg>
