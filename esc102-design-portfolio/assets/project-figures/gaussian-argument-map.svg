<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Gaussian argument map</title>
  <desc id="desc">A step-by-step reasoning map from analytical framing through benchmark pressure to a scoped conclusion.</desc>
  <rect width="1200" height="820" fill="#f7f0e4"/>
  <rect x="40" y="40" width="1120" height="740" rx="36" fill="#fffaf2" stroke="#d9c7ae" stroke-width="3"/>

  <text x="72" y="104" font-family="'Public Sans', Arial, sans-serif" font-size="18" fill="#7e5a36" letter-spacing="3">GAUSSIAN ARGUMENT MAP</text>
  <text x="72" y="146" font-family="'Fraunces', Georgia, serif" font-size="35" fill="#18202a">The claim only worked because the figures could push back on it</text>
  <text x="72" y="186" font-family="'Public Sans', Arial, sans-serif" font-size="20" fill="#475362">This map reads left to right: frame the problem, state the claim, benchmark it, then keep only the supported scope.</text>

  <g font-family="'Public Sans', Arial, sans-serif">
    <rect x="92" y="286" width="220" height="228" rx="28" fill="#fff7f1" stroke="#d8c7b0" stroke-width="2"/>
    <text x="122" y="326" font-size="18" fill="#7e5a36" letter-spacing="2">1 FRAME</text>
    <text x="122" y="366" font-size="28" font-weight="700" fill="#19202a">Choose the</text>
    <text x="122" y="400" font-size="28" font-weight="700" fill="#19202a">symmetric setting</text>
    <text x="122" y="438" font-size="18" fill="#475362">The first move is deciding what</text>
    <text x="122" y="464" font-size="18" fill="#475362">structure to preserve so the</text>
    <text x="122" y="490" font-size="18" fill="#475362">problem stays readable.</text>

    <rect x="350" y="286" width="220" height="228" rx="28" fill="#fff" stroke="#d8c7b0" stroke-width="2"/>
    <text x="380" y="326" font-size="18" fill="#7e5a36" letter-spacing="2">2 CLAIM</text>
    <text x="380" y="366" font-size="28" font-weight="700" fill="#19202a">Write the threshold</text>
    <text x="380" y="400" font-size="28" font-weight="700" fill="#19202a">in parameters</text>
    <text x="380" y="438" font-size="18" fill="#475362">Replace repeated numerical</text>
    <text x="380" y="464" font-size="18" fill="#475362">checks with a direct condition</text>
    <text x="380" y="490" font-size="18" fill="#475362">that can still be challenged.</text>

    <rect x="608" y="286" width="220" height="228" rx="28" fill="#eef7f1" stroke="#d8c7b0" stroke-width="2"/>
    <text x="638" y="326" font-size="18" fill="#7e5a36" letter-spacing="2">3 BENCHMARK</text>
    <text x="638" y="366" font-size="28" font-weight="700" fill="#19202a">Use plots to test</text>
    <text x="638" y="400" font-size="28" font-weight="700" fill="#19202a">where it drifts</text>
    <text x="638" y="438" font-size="18" fill="#475362">The figures act as pressure:</text>
    <text x="638" y="464" font-size="18" fill="#475362">they show where the shorter</text>
    <text x="638" y="490" font-size="18" fill="#475362">argument stops tracking well.</text>

    <rect x="866" y="286" width="242" height="228" rx="28" fill="#13212a" opacity="0.97"/>
    <text x="896" y="326" font-size="18" fill="#d8e6e8" letter-spacing="2">4 KEEP</text>
    <text x="896" y="366" font-size="28" font-weight="700" fill="#f5efe4">State only the</text>
    <text x="896" y="400" font-size="28" font-weight="700" fill="#f5efe4">supported range</text>
    <text x="896" y="438" font-size="18" fill="#d8e6e8">The final claim narrows to the</text>
    <text x="896" y="464" font-size="18" fill="#d8e6e8">regimes where the benchmark</text>
    <text x="896" y="490" font-size="18" fill="#d8e6e8">still justifies the shortcut.</text>
  </g>

  <g stroke="#255d67" stroke-width="12" stroke-linecap="round" fill="none">
    <path d="M312 400 H350"/>
    <path d="M570 400 H608"/>
    <path d="M828 400 H866"/>
  </g>

  <g stroke="#255d67" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M332 382 L350 400 L332 418"/>
    <path d="M590 382 L608 400 L590 418"/>
    <path d="M848 382 L866 400 L848 418"/>
  </g>

  <g>
    <rect x="92" y="592" width="1016" height="104" rx="26" fill="#fff" stroke="#d8c7b0" stroke-width="2"/>
    <text x="124" y="638" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#aa5a32" letter-spacing="2">READING GUIDE</text>
    <text x="124" y="674" font-family="'Public Sans', Arial, sans-serif" font-size="20" fill="#475362">The plots do not sit beside the claim as decoration. They are the step that decides whether the reduced result gets to stay broad or has to narrow.</text>
  </g>
</svg>
