<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Praxis II parent-led workflow summary</title>
  <desc id="desc">A three-step summary showing how the Praxis II team moved from a staff bottleneck to a parent-led two-station wristband workflow.</desc>
  <rect width="1200" height="760" fill="#f7f0e4"/>
  <rect x="48" y="44" width="1104" height="672" rx="34" fill="#fffaf2" stroke="#d8c7b0" stroke-width="3"/>

  <text x="88" y="104" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#255d67" letter-spacing="3">PRAXIS II SOLUTION SUMMARY</text>
  <text x="88" y="154" font-family="'Fraunces', Georgia, serif" font-size="42" fill="#18202a">Parent-led wristband application</text>
  <text x="88" y="196" font-family="'Public Sans', Arial, sans-serif" font-size="20" fill="#475362">The final direction moved wristband application away from one staff bottleneck and into two parallel parent stations.</text>

  <g font-family="'Public Sans', Arial, sans-serif">
    <rect x="86" y="260" width="300" height="258" rx="28" fill="#eef4fb" stroke="#cbd8e2" stroke-width="2"/>
    <text x="120" y="306" font-size="17" fill="#255d67" letter-spacing="2">1. REOPEN</text>
    <text x="120" y="350" font-size="30" font-weight="700" fill="#19202a">Staff bottleneck</text>
    <text x="120" y="388" font-size="19" fill="#475362">Wristbands were not only a</text>
    <text x="120" y="418" font-size="19" fill="#475362">device problem. They were part</text>
    <text x="120" y="448" font-size="19" fill="#475362">of a crowded check-in routine.</text>

    <rect x="450" y="240" width="300" height="298" rx="28" fill="#f3ebff" stroke="#d3c0e7" stroke-width="2"/>
    <text x="484" y="286" font-size="17" fill="#255d67" letter-spacing="2">2. CONVERGE</text>
    <text x="484" y="330" font-size="30" font-weight="700" fill="#19202a">Two parent stations</text>
    <text x="484" y="368" font-size="19" fill="#475362">Parents apply bands in parallel.</text>
    <text x="484" y="398" font-size="19" fill="#475362">Staff stay in attendance,</text>
    <text x="484" y="428" font-size="19" fill="#475362">verification, and correction.</text>
    <rect x="492" y="464" width="216" height="40" rx="20" fill="#ffffff" stroke="#d8c7b0" stroke-width="2"/>
    <text x="524" y="490" font-size="17" font-weight="700" fill="#19202a">Easier to follow</text>

    <rect x="814" y="260" width="300" height="258" rx="28" fill="#eef8f1" stroke="#bed8c7" stroke-width="2"/>
    <text x="848" y="306" font-size="17" fill="#255d67" letter-spacing="2">3. PROTOTYPE</text>
    <text x="848" y="350" font-size="30" font-weight="700" fill="#19202a">One band dispensed</text>
    <text x="848" y="388" font-size="19" fill="#475362">The sliding tray presents one</text>
    <text x="848" y="418" font-size="19" fill="#475362">wristband clearly so a parent</text>
    <text x="848" y="448" font-size="19" fill="#475362">can apply it to the child.</text>
  </g>

  <g fill="none" stroke="#43a1e8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M404 388 H430"/>
    <path d="M770 388 H796"/>
  </g>
  <g fill="#43a1e8">
    <path d="M432 388 L408 372 L408 404 Z"/>
    <path d="M798 388 L774 372 L774 404 Z"/>
  </g>

  <g font-family="'Public Sans', Arial, sans-serif">
    <rect x="132" y="590" width="936" height="68" rx="22" fill="#13212a"/>
    <text x="176" y="632" font-size="19" fill="#f5efe4">Reading guide: the device supports the workflow; it is not the whole solution by itself.</text>
  </g>
</svg>
