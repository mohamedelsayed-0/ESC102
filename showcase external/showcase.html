<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrist Wizard Showcase</title>
  <style>
    :root {
      --bg: #eef5ff;
      --panel: rgba(255, 255, 255, 0.7);
      --ink: #163f87;
      --subtle: #5a78bb;
      --stroke: rgba(108, 146, 228, 0.22);
      --accent-a: #5a39eb;
      --accent-b: #3fa3ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(84, 73, 233, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(63, 163, 255, 0.18), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: Georgia, serif;
    }

    .frame {
      width: min(1100px, calc(100vw - 40px));
      padding: 28px;
      border-radius: 32px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      box-shadow: 0 24px 80px rgba(31, 76, 162, 0.12);
      backdrop-filter: blur(12px);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 52px);
      line-height: 0.95;
      color: var(--ink);
    }

    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      font: 700 14px/1.1 "Trebuchet MS", sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink);
      background: linear-gradient(90deg, rgba(90, 57, 235, 0.14), rgba(63, 163, 255, 0.14));
      border: 1px solid rgba(90, 57, 235, 0.15);
      white-space: nowrap;
    }

    video {
      width: 100%;
      display: block;
      border-radius: 24px;
      background: #d9e7ff;
      box-shadow: 0 12px 40px rgba(33, 75, 147, 0.14);
    }

    .player-shell {
      position: relative;
    }

    .status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(238, 245, 255, 0.82), rgba(222, 236, 255, 0.9));
      color: var(--ink);
      font: 700 18px/1.2 "Trebuchet MS", sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status[hidden] {
      display: none;
    }

    .links {
      margin-top: 14px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font: 600 14px/1.2 "Trebuchet MS", sans-serif;
    }

    a {
      color: var(--subtle);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-a);
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="topline">
      <h1>Wrist Wizard Showcase</h1>
      <div class="chip">Simulation Visualization</div>
    </div>
    <div class="player-shell">
      <video id="player" controls muted playsinline preload="auto" poster="wrist-wizard-showcase-poster.png?v=9"></video>
      <div id="status" class="status">Loading Video</div>
    </div>
    <div class="links">
      <a href="wrist-wizard-showcase.mp4?v=9">Direct MP4</a>
      <a href="wrist-wizard-showcase-poster.png?v=9">Poster Frame</a>
    </div>
  </main>
  <script>
    const video = document.getElementById("player");
    const status = document.getElementById("status");
    const videoUrl = "wrist-wizard-showcase.mp4?v=9";
    const fileUrl = "./wrist-wizard-showcase.mp4";

    async function loadVideo() {
      try {
        status.textContent = "Loading Video";
        if (window.location.protocol === "file:") {
          video.src = fileUrl;
          status.hidden = true;
          return;
        }
        const response = await fetch(videoUrl, { cache: "reload" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        video.src = objectUrl;
        await video.play().catch(() => {});
        status.hidden = true;
      } catch (error) {
        status.textContent = "Use Direct MP4 Link";
        console.error(error);
      }
    }

    loadVideo();
  </script>
</body>
</html>
